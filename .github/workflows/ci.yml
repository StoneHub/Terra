name: Mac CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Ruby 3.4.10 on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15
          - macos-15-intel

    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.10
          bundler-cache: true
      - run: bundle exec rake
      - name: Smoke-test the real launcher
        run: printf 'exit\n' | bin/terra
